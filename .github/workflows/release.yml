name: Release DMG

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never abort a release mid-flight

jobs:
  release:
    runs-on: macos-26 # Apple Silicon, universal build; Xcode 26 default = Swift 6.x (matches local, clears the swift-tools-version:6.0 gate)
    steps:
      - uses: actions/checkout@v6

      - name: Derive version from tag
        id: ver
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not vMAJOR.MINOR.PATCH[-pre]"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests (gate)
        run: swift test

      - name: Install create-dmg
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1" # skip the slow formulae-index refresh; create-dmg is already in the runner image
          HOMEBREW_NO_INSTALL_UPGRADE: "1" # don't upgrade unrelated preinstalled formulae mid-release
        run: brew install create-dmg

      - name: Build DMG
        env:
          MARKETING_VERSION: ${{ steps.ver.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
        run: ./scripts/build-dmg.sh

      - name: Verify stamped version
        run: |
          set -euo pipefail
          APP=".build/xcode/Build/Products/Release/BrainDump.app"
          GOT=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist")
          if [[ "$GOT" != "${{ steps.ver.outputs.version }}" ]]; then
            echo "::error::version mismatch: got '$GOT'"; exit 1
          fi

      - name: Package zip for Sparkle
        run: |
          set -euo pipefail
          APP=".build/xcode/Build/Products/Release/BrainDump.app"
          ditto -c -k --keepParent "$APP" build/BrainDump.zip

      - name: Fetch Sparkle tools
        env:
          SPARKLE_VERSION: "2.9.3" # keep in sync with the SPM dependency; bump if newer
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle && tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle
          echo "SPARKLE_BIN=/tmp/sparkle/bin" >> "$GITHUB_ENV"

      - name: Sign update and build appcast
        if: ${{ steps.ver.outputs.prerelease == 'false' }}
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD: ${{ github.run_number }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          SIG_LINE=$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$SPARKLE_BIN/sign_update" --ed-key-file - build/BrainDump.zip)
          if ! printf '%s' "$SIG_LINE" | grep -q 'edSignature="'; then
            echo "::error::sign_update did not return an edSignature: $SIG_LINE"; exit 1
          fi
          ED=$(printf '%s' "$SIG_LINE" | sed -E 's/.*edSignature="([^"]+)".*/\1/')
          PREV=""
          if gh release download --pattern appcast.xml --dir build/prev 2>/dev/null; then
            PREV="build/prev/appcast.xml"
          fi
          python3 scripts/make-appcast.py \
            --prev "$PREV" \
            --version "$VERSION" --build "$BUILD" --tag "$TAG" \
            --zip build/BrainDump.zip --signature "$ED" \
            --min-system 14.0 \
            --out build/appcast.xml
          xmllint --noout build/appcast.xml
          test -n "$ED"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Auto-generated changelog (commits/PRs since the previous tag).
          GENERATED=$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$GITHUB_REF_NAME" --jq .body)
          # Prepend the static install/first-launch instructions above it.
          { cat .github/release-notes.md; printf '\n\n'; printf '%s\n' "$GENERATED"; } \
            > "$RUNNER_TEMP/notes.md"
          flags=(--title "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/notes.md")
          if [[ "${{ steps.ver.outputs.prerelease }}" == "true" ]]; then
            flags+=(--prerelease)
          fi
          assets=(build/BrainDump.dmg)
          if [[ "${{ steps.ver.outputs.prerelease }}" == "false" ]]; then
            assets+=(build/BrainDump.zip build/appcast.xml)
          fi
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" "${flags[@]}"
